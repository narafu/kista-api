name: Keep Supabase Alive

on:
  schedule:
    # 매일 UTC 03:00 (KST 12:00) -- 7일 무활동 pause 방지
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  heartbeat:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase DB
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          psql "$DB_URL" -c "SELECT 1 FROM kis_tokens LIMIT 1;" \
            || psql "$DB_URL" -c "SELECT 1;"
