spring:
  application:
    name: kista-api

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      pool-name: HikariPool-KistaApi

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  task:
    scheduling:
      thread-name-prefix: kista-api-scheduler-

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

server:
  port: 8080
  shutdown: graceful

kis:
  base-url: https://openapi.koreainvestment.com:9443

toss:
  base-url: https://openapi.tossinvest.com

telegram:
  bot-token: ${TELEGRAM_BOT_TOKEN}
  chat-id: ${TELEGRAM_CHAT_ID}

crypto:
  aes-key: ${AES_ENCRYPTION_KEY}

app:
  cookie:
    secure: true        # prod: HTTPS 쿠키
    same-site: "None"   # prod: 크로스 오리진(Vercel→Fly.io)

jwt:
  signing-key: ${JWT_SIGNING_KEY}

kakao:
  client-id: ${KAKAO_CLIENT_ID}
  client-secret: ${KAKAO_CLIENT_SECRET:}

admin:
  kakao-ids: ${ADMIN_KAKAO_IDS:}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

internal:
  api:
    token: ${INTERNAL_API_TOKEN:}

alpaca:
  base-url: https://paper-api.alpaca.markets
  api-key: ${ALPACA_API_KEY:}
  api-secret: ${ALPACA_API_SECRET:}

firebase:
  service-account-json: ${FIREBASE_SERVICE_ACCOUNT_JSON:}

logging:
  level:
    root: INFO
    com.kista: DEBUG
