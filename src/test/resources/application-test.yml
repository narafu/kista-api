spring:
  datasource:
    # Testcontainers JDBC URL: 테스트 실행 시 자동으로 PostgreSQL 컨테이너를 기동합니다
    url: jdbc:tc:postgresql:16:///testdb
    username: test
    password: test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  flyway:
    enabled: true

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate

  ai:
    mcp:
      server:
        enabled: false

logging:
  level:
    org.hibernate.SQL: DEBUG
