app = "kista-api"
primary_region = "nrt"

[env]
SPRING_PROFILES_ACTIVE = "prod"

[http_service]
auto_start_machines = true
auto_stop_machines = true       # 평소 트래픽 없으면 잠재우기
force_https = true
internal_port = 8080
min_machines_running = 1         # 평소 최소 가동 대수 1대
processes = [ "app" ]

[[http_service.checks]]
grace_period = "3m0s"
interval = "30s"
method = "GET"
path = "/actuator/health"
protocol = "http"
timeout = "10s"

[deploy]
strategy = "rolling"

# Fly.io 2GB 실험: JVM heap 여유와 GC 압박 완화 목적
[[vm]]
cpu_kind = "shared"
cpus = 1
memory = "2gb"
