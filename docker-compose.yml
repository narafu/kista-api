services:
  # ── Application ──────────────────────────────────────────────────────────────
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_URL: jdbc:postgresql://postgres:5432/kistadb
      DB_USERNAME: kista
      DB_PASSWORD: kista
      KIS_APP_KEY: ${KIS_APP_KEY:-}
      KIS_APP_SECRET: ${KIS_APP_SECRET:-}
      KIS_ACCOUNT_NO: ${KIS_ACCOUNT_NO:-}
      KIS_ACCOUNT_TYPE: ${KIS_ACCOUNT_TYPE:-01}
      KIS_SYMBOL: ${KIS_SYMBOL:-SOXL}
      KIS_EXCHANGE_CODE: ${KIS_EXCHANGE_CODE:-AMS}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - kista-net

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: kistadb
      POSTGRES_USER: kista
      POSTGRES_PASSWORD: kista
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kista -d kistadb"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kista-net

  # ── Prometheus ────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    networks:
      - kista-net

  # ── Grafana ───────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.2.2
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - kista-net

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  kista-net:
    driver: bridge
