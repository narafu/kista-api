services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-}
      POSTGRES_USER: ${DB_USERNAME:-}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kista-api-net

  # ── Prometheus ────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    networks:
      - kista-api-net

  # ── Grafana ───────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.2.2
    ports:
      - "3030:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - kista-api-net

  # ── kis-coding-mcp ───────────────────────────────────────────────────────────
  kis-coding-mcp:
    container_name: kis-coding-mcp
    build:
      context: ../../kis-mcp
      dockerfile: Dockerfile.kis-coding-mcp
    restart: unless-stopped
    # Claude Code에서 http://localhost:3001/mcp 로 연결
    ports:
      - "3001:8081"
    networks:
      - kista-api-net

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  kista-api-net:
    driver: bridge